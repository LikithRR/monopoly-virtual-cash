<div class="page">
  <h1 class="title">Add Players</h1>
  <div class="players">
    <div
      class="player-box"
      *ngFor="let player of playerInputs; let i = index; trackBy: trackByIndex"
    >
      <input type="text" placeholder="Enter Name" [(ngModel)]="playerInputs[i]" />
      <button class="remove-btn" (click)="removePlayerBox(i)">X</button>
    </div>
  </div>

  <button class="add-btn" (click)="addPlayerBox()">+ Add Player</button>

  <h1 class="cash-title">Starting Cash</h1>
  <div class="cash-box">
    <input type="number" [(ngModel)]="gameData.startingCash" placeholder="Enter starting cash" />
  </div>

  <button class="start-btn" (click)="startGame()" [disabled]="!validGame">▶ Start Game</button>
</div>
