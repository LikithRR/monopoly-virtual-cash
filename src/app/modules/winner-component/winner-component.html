<div class="page">

  <!-- Confetti canvas -->
  <canvas id="confetti-canvas"></canvas>

  <div class="winner-card">

    <div class="crown">👑</div>

    <h1 class="winner-title">
      The Winner is
    </h1>

    <h1 class="winner-name">
      {{ gameData.winner!.name }}
    </h1>

    <h2 class="amount">
      💰 ₹{{ gameData.winner!.amount }}
    </h2>

  </div>

  <h2 class="section-title">Final Standings</h2>

  <table>

    <tr>
      <th>Position</th>
      <th>Name</th>
    </tr>

    <tr class="podium first">
      <td>1 🥇</td>
      <td>{{ gameData.winner!.name }}</td>
    </tr>

    <tr *ngFor="let player of gameData.positions; let i = index">
      <td>{{ i + 2 }}</td>
      <td>{{ player.name }}</td>
    </tr>

  </table>

</div>
